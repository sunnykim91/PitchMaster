name: Supabase Weekly Backup

# 매주 일요일 KST 03:00 (UTC 토요일 18:00) 자동 실행 + 수동 실행 가능
on:
  schedule:
    - cron: '0 18 * * 6'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    # 실수로 secret 없는 환경에서 돌지 않게 타임아웃 짧게
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          # PGDG APT repo — Ubuntu 기본 패키지는 16까지라 PGDG 추가 필요.
          # Supabase 가 PostgreSQL 17 기반이라 pg_dump 도 17 로 맞춰야
          # "aborting because of server version mismatch" 회피.
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # pipefail: pg_dump 실패 시 전체 스텝 실패로 판정 (파이프 뒤 gzip 성공해도)
          set -euo pipefail

          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set"
            exit 1
          fi
          TIMESTAMP=$(TZ=Asia/Seoul date +'%Y%m%d_%H%M%S_KST')
          FILENAME="supabase_backup_${TIMESTAMP}.sql.gz"

          # --no-owner --no-acl: 복원 시 소유자·권한 충돌 방지
          # --clean --if-exists: 덮어쓰기 복원 가능 (DROP ... IF EXISTS 포함)
          # schema=public 만: auth·storage 시스템 스키마는 Supabase 관리
          pg_dump "$DATABASE_URL" \
            --schema=public \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            | gzip > "$FILENAME"

          BYTES=$(stat -c '%s' "$FILENAME")
          SIZE=$(ls -lh "$FILENAME" | awk '{print $5}')
          echo "Backup $FILENAME — $SIZE ($BYTES bytes)"

          # 빈 gzip (~20 bytes) 또는 이상 없이 성공했지만 데이터 없음 방지
          # 실제 public 스키마에 최소 수 KB 은 나와야 정상
          MIN_BYTES=1024
          if [ "$BYTES" -lt "$MIN_BYTES" ]; then
            echo "::error::Backup file is suspiciously small ($BYTES bytes < $MIN_BYTES). pg_dump likely failed."
            # 내용 일부를 디버그로 (에러 문자열이 있을 수 있음)
            echo "--- first 500 bytes of decompressed content ---"
            gunzip -c "$FILENAME" | head -c 500 || true
            exit 1
          fi

          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "SIZE=$SIZE" >> $GITHUB_ENV
          echo "BYTES=$BYTES" >> $GITHUB_ENV

      - name: Upload backup artifact (retained 90 days)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### ✅ Supabase backup complete" >> $GITHUB_STEP_SUMMARY
          echo "- File: \`${{ env.FILENAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Size: ${{ env.SIZE }} (${{ env.BYTES }} bytes)" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 90 days (download from Artifacts)" >> $GITHUB_STEP_SUMMARY
